<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Пошук піратських скарбів</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #87CEEB;
}

canvas {
    background: #f4e4a1;
    border: 3px solid brown;
    border-radius: 10px;
}

#game {
    margin-top: 10px;
}

#task {
    font-size: 24px;
    margin: 10px;
}

#lives {
    color: red;
    font-size: 22px;
}

#stars {
    font-size: 30px;
    color: gold;
}

textarea {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🏴‍☠️ Пошук піратських скарбів</h1>

<canvas id="map" width="600" height="300"></canvas>

<div id="game">
    <div id="dialog"></div>
    <div id="lives">❤️❤️❤️</div>
    <div>Час: <span id="time">0</span> сек</div>

    <div id="task"></div>
    <input type="number" id="answer">
    <button onclick="checkAnswer()">Відповісти</button>

    <div id="result"></div>
</div>

<hr>

<h2>👩‍🏫 Режим вчителя</h2>

<textarea id="teacherInput" rows="5" cols="40"
placeholder="Формат: 2+2=4, 5*3=15"></textarea><br>

<button onclick="loadTasks()">Завантажити завдання</button>
<button onclick="generateLink()">Згенерувати посилання</button>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

// Маршрут
const path = [
    {x:50,y:150},
    {x:150,y:100},
    {x:250,y:180},
    {x:350,y:120},
    {x:450,y:160},
    {x:550,y:140}
];

let positionIndex = 0;
let charX = path[0].x;
let charY = path[0].y;

let tasks = [
    {q:"2+2", a:4},
    {q:"5+3", a:8},
    {q:"6-1", a:5}
];

let current = 0;
let correct = 0;
let lives = 3;
let startTime = Date.now();

document.getElementById("dialog").innerText =
"🧑‍☠️ Капітан Роджер: Допоможи знайти скарби!";

// Малювання
function drawMap() {
    ctx.clearRect(0,0,600,300);

    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let p of path) ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = "brown";
    ctx.lineWidth = 3;
    ctx.stroke();

    for (let p of path) {
        ctx.beginPath();
        ctx.arc(p.x,p.y,5,0,Math.PI*2);
        ctx.fill();
    }

    ctx.fillText("💰", path[path.length-1].x-10, path[path.length-1].y-10);

    ctx.font = "30px Arial";
    ctx.fillText("🧑‍☠️", charX, charY);
    ctx.fillText("🦜", charX+25, charY);
}

// Рух
function moveCharacter(callback) {
    if (positionIndex >= path.length-1) return;

    let next = path[positionIndex+1];
    let dx = (next.x - charX)/20;
    let dy = (next.y - charY)/20;

    let steps = 0;
    let interval = setInterval(() => {
        charX += dx;
        charY += dy;
        drawMap();
        steps++;

        if (steps >= 20) {
            clearInterval(interval);
            positionIndex++;
            if (callback) callback();
        }
    }, 30);
}

// UI
function updateUI() {
    document.getElementById("task").innerText =
        current < tasks.length ? tasks[current].q : "";
    document.getElementById("lives").innerText = "❤️".repeat(lives);
}

// Перевірка
function checkAnswer() {
    let user = Number(document.getElementById("answer").value);

    if (user === tasks[current].a) {
        correct++;
        playSound(true);
        moveCharacter();
    } else {
        lives--;
        playSound(false);
    }

    current++;

    if (lives <= 0 || current >= tasks.length) {
        setTimeout(endGame, 700);
    } else {
        updateUI();
        document.getElementById("answer").value = "";
    }
}

// Завершення
function endGame() {
    let time = Math.floor((Date.now() - startTime)/1000);
    let percent = (correct/tasks.length)*100;

    let stars = 0;
    if (percent > 75) stars = 3;
    else if (percent > 50) stars = 2;
    else if (percent < 25 && percent > 0) stars = 1;

    let starDisplay = "⭐".repeat(stars);

    document.getElementById("dialog").innerText =
    lives > 0 ?
    "🧑‍☠️ Дякую тобі! Ми знайшли скарб!" :
    "😢 Ми втратили всі життя...";

    document.getElementById("result").innerHTML = `
    <h2>Результат</h2>
    ${correct}/${tasks.length}<br>
    Час: ${time} сек<br>
    <div id="stars">${starDisplay}</div>
    `;
}

// Звуки
function playSound(success) {
    let audio = new Audio(
        success ?
        "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" :
        "https://actions.google.com/sounds/v1/cartoon/boing.ogg"
    );
    audio.play();
}

// Таймер
setInterval(() => {
    document.getElementById("time").innerText =
    Math.floor((Date.now() - startTime)/1000);
},1000);

// 👩‍🏫 РЕЖИМ ВЧИТЕЛЯ
function loadTasks() {
    let input = document.getElementById("teacherInput").value;
    let lines = input.split(",");

    tasks = lines.map(line => {
        let parts = line.split("=");
        return {q: parts[0], a: Number(parts[1])};
    });

    resetGame();
    alert("Завдання завантажено!");
}

function generateLink() {
    let data = encodeURIComponent(JSON.stringify(tasks));
    let link = window.location.href.split("?")[0] + "?tasks=" + data;
    alert("Скопіюйте посилання:\n" + link);
}

// Завантаження з посилання
window.onload = function() {
    let params = new URLSearchParams(window.location.search);
    if (params.get("tasks")) {
        tasks = JSON.parse(decodeURIComponent(params.get("tasks")));
    }
    resetGame();
};

// Скидання гри
function resetGame() {
    current = 0;
    correct = 0;
    lives = 3;
    positionIndex = 0;
    charX = path[0].x;
    charY = path[0].y;
    startTime = Date.now();
    document.getElementById("result").innerHTML = "";
    document.getElementById("dialog").innerText =
    "🧑‍☠️ Капітан Роджер: Допоможи знайти скарби!";
    updateUI();
    drawMap();
}

drawMap();
updateUI();
</script>

</body>
</html>
